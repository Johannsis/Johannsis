name: Update README about
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Update README file
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: bun run about
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@johannsis.github.io"
          git config --global user.name "Johannsis/GitHub-Actions-Bot"
          git commit -m "chore: updated README about section" -a || echo "No changes to commit"
          git push origin main
