<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="985" height="530" viewBox="0 0 985 530" font-family="Consolas, Menlo, Monaco, monospace" font-size="16">
  <style>
    .bg { fill: #161b22; }
    .title { fill: #c9d1d9; font-size: 24px; font-weight: 700; }
    .label { fill: #ffa657; }
    .dots { fill: #616e7f; }
    .value { fill: #a5d6ff; }
    .add { fill: #3fb950; }
    .del { fill: #f85149; }
  </style>

  <rect class="bg" width="985" height="530" rx="16" />

  <text class="title" x="32" y="50">Johannes Hoersch - GitHub Profile Stats</text>

  <text x="32" y="110">
    <tspan class="label">Repos</tspan>
    <tspan class="dots" id="repo_data_dots"> .... </tspan>
    <tspan class="value" id="repo_data">0</tspan>
    <tspan class="label"> | Contributed</tspan>
    <tspan class="dots" id="contrib_data_dots"> </tspan>
    <tspan class="value" id="contrib_data">0</tspan>
  </text>

  <text x="32" y="160">
    <tspan class="label">Stars</tspan>
    <tspan class="dots" id="star_data_dots"> ......... </tspan>
    <tspan class="value" id="star_data">0</tspan>
    <tspan class="label"> | Followers</tspan>
    <tspan class="dots" id="follower_data_dots"> ....... </tspan>
    <tspan class="value" id="follower_data">0</tspan>
  </text>

  <text x="32" y="210">
    <tspan class="label">Commits</tspan>
    <tspan class="dots" id="commit_data_dots"> ................. </tspan>
    <tspan class="value" id="commit_data">0</tspan>
  </text>

  <text x="32" y="260">
    <tspan class="label">Lines of Code</tspan>
    <tspan class="dots" id="loc_data_dots"> . </tspan>
    <tspan class="value" id="loc_data">0</tspan>
    <tspan class="dots"> ( </tspan>
    <tspan class="add" id="loc_add">0</tspan>
    <tspan class="add">++</tspan>
    <tspan class="dots" id="loc_del_dots"> </tspan>
    <tspan class="del" id="loc_del">0</tspan>
    <tspan class="del">--</tspan>
    <tspan class="dots"> )</tspan>
  </text>

  <text x="32" y="320">
    <tspan class="label">Uptime</tspan>
    <tspan class="dots" id="age_data_dots"> ...................... </tspan>
    <tspan class="value" id="age_data">0 years, 0 months, 0 days</tspan>
  </text>
</svg>
